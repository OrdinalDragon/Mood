# Nginx config - Proxy to frontend and backend
server {
    listen 80;
    server_name localhost;

    # Routes that start with /event, /map, etc -> redirect to hash
    location ~ ^/(event|map|calendar|submit|admin)/ {
        return 301 $scheme://$host/#$request_uri;
    }

    # Root -> frontend
    location / {
        proxy_pass http://mood_frontend:80/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # API -> backend
    location /api/ {
        proxy_pass http://mood_backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Swagger docs -> backend
    location /docs/ {
        proxy_pass http://mood_backend:8000/docs/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}